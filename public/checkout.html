<!-- 📁 checkout.html - Confirmación de pedido | TianguiStore -->
<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirmación Del Pedido | TianguiStore</title>

  <!-- MaterializeCSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet" />
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="estilo/main.css" />
</head>

<body class="page-bg">

  <!-- Navbar dinámico -->
  <div id="navbar-container"></div>

  <!-- Contenido principal -->
  <main class="container checkout-container">
    <div class="row valign-wrapper top-gap">
      <div class="col s12 m8">
        <div class="card-panel glass-card">
          <div class="step-header">
            <div class="step active">1</div>
            <div class="step-label">Dirección</div>
            <div class="line"></div>
            <div class="step">2</div>
            <div class="step-label">Pago</div>
            <div class="line"></div>
            <div class="step">3</div>
            <div class="step-label">Confirmar</div>
          </div>

          <h4 class="section-title"><i class="fas fa-truck-fast"></i> Detalles de envío</h4>

          <form id="form-envio" class="checkout-form" autocomplete="on" novalidate>
            <div class="row">
              <div class="input-field col s12">
                <input id="nombre" name="nombre" type="text" class="validate" required maxlength="80" autocomplete="name">
                <label for="nombre">Nombre completo</label>
              </div>

              <div class="input-field col s12">
                <input id="telefono" name="telefono" type="tel" class="validate" required maxlength="20" autocomplete="tel">
                <label for="telefono">Teléfono de contacto</label>
              </div>

              <div class="input-field col s12">
                <input id="direccion_entrega" name="direccion_entrega" type="text" class="validate" required autocomplete="street-address" maxlength="255">
                <label for="direccion_entrega">📍 Dirección completa</label>
              </div>

              <div class="input-field col s12 m6">
                <input id="ciudad" name="ciudad" type="text" class="validate" required maxlength="60">
                <label for="ciudad">Ciudad</label>
              </div>

              <div class="input-field col s12 m6">
                <input id="codigo_postal" name="codigo_postal" type="text" class="validate" maxlength="12" autocomplete="postal-code">
                <label for="codigo_postal">Código postal</label>
              </div>

              <div class="input-field col s12">
                <select id="metodo_pago" name="metodo_pago" class="browser-default select-styled" required>
                  <option value="" disabled selected>💳 Selecciona un método de pago</option>
                  <option value="efectivo">Efectivo</option>
                  <option value="tarjeta">Tarjeta de Crédito/Débito</option>
                  <option value="transferencia">Transferencia Bancaria</option>
                </select>
              </div>

              <div class="input-field col s12">
                <input id="cupon" name="cupon" type="text" maxlength="30" placeholder="Código promocional (opcional)">
                <label for="cupon">🎟️ Código de cupón</label>
              </div>

              <div class="input-field col s12">
                <textarea id="comentarios" name="comentarios" class="materialize-textarea" maxlength="300" placeholder="Instrucciones especiales"></textarea>
                <label for="comentarios">📝 Comentarios</label>
              </div>
            </div>

            <div class="row mb-0">
              <div class="col s12">
                <button type="submit" class="btn-primary full-width">
                  <i class="material-icons left">check_circle</i> Confirmar pedido
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="col s12 m4">
        <aside class="card-panel summary-card">
          <h5 class="summary-title"><i class="fas fa-receipt"></i> Resumen del pedido</h5>

          <div id="order-items" class="order-items">
            <!-- Placeholder dinámico para los productos del carrito -->
            <div class="order-item">
              <div class="item-info">
                <span class="item-name">Nombre del producto A</span>
                <span class="item-qty">x1</span>
              </div>
              <div class="item-price">$199.00</div>
            </div>
            <div class="order-item">
              <div class="item-info">
                <span class="item-name">Nombre del producto B</span>
                <span class="item-qty">x2</span>
              </div>
              <div class="item-price">$398.00</div>
            </div>
          </div>

          <div class="summary-totals">
            <div class="tot-line">
              <span>Subtotal</span>
              <span id="subtotal">$597.00</span>
            </div>
            <div class="tot-line">
              <span>Envío</span>
              <span id="envio">$50.00</span>
            </div>
            <div class="tot-line total">
              <span>Total</span>
              <span id="total">$647.00</span>
            </div>
          </div>

          <div class="summary-actions">
            <button id="apply-coupon" class="btn-flat">Aplicar cupón</button>
            <button id="edit-cart" class="btn-flat">Editar carrito</button>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <!-- Footer dinámico -->
  <div id="footer-container"></div>

  <!-- Scripts del sistema -->
  <script src="scripts/loadComponent.js" defer></script>
  <script src="scripts/checkout.js" defer></script>

  <!-- Materialize JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js" defer></script>
</body>
</html>
