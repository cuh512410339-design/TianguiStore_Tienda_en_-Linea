<!-- 📁 404.html - Página de error 404 TianguiStore -->
<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 • Página no encontrada — TianguiStore</title>

  <!-- MaterializeCSS (opcional) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" crossorigin="anonymous" />
  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="estilo/main.css" />

  <meta name="robots" content="noindex, nofollow">
</head>
<body class="page-404">

  <!-- header cargado dinámicamente -->
  <div data-include="header.html" class="site-header"></div>

  <main class="container content center-align" role="main" aria-labelledby="error-title">
    <section class="card-panel large-panel z-depth-2 animate-card" aria-describedby="error-desc">
      <div class="illustration" aria-hidden="true">
        <i class="fa-solid fa-compass-drafting fa-6x accent"></i>
      </div>

      <h1 id="error-title" class="big">404</h1>
      <h2 class="muted">Página no encontrada</h2>

      <p id="error-desc" class="lead">
        Lo sentimos — la página que buscas no existe o fue movida.
      </p>

      <div class="actions">
        <a href="/index.html" class="btn-primary" aria-label="Volver al inicio">
          <i class="fa-solid fa-house"></i> Ir al inicio
        </a>

        <a href="javascript:history.back()" class="btn-secondary" aria-label="Volver atrás">
          <i class="fa-solid fa-arrow-left"></i> Volver
        </a>
      </div>

      <form class="search-form" action="/search.html" method="get" role="search" aria-label="Buscar en el sitio">
        <input name="q" type="search" placeholder="Buscar productos, categorías..." aria-label="Buscar" />
        <button type="submit" class="btn-outline">Buscar</button>
      </form>
    </section>
  </main>

  <!-- footer cargado dinámicamente -->
  <div data-include="footer.html" class="site-footer"></div>

  <!-- Scripts -->
  <script>
    // Cargar header/footer simples (coloca header.html y footer.html en la misma carpeta pública)
    (function loadPartials(){
      document.querySelectorAll('[data-include]').forEach(async el => {
        const path = el.getAttribute('data-include');
        try {
          const resp = await fetch(path);
          if (resp.ok) el.innerHTML = await resp.text();
        } catch (e) { /* fallar silenciosamente */ }
      });
    })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js" defer></script>
</body>
</html>
